<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Cabtech Round Logo</title>
  <desc id="desc">Round high-resolution logo with cab in red and tech in black.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f4f6"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <circle cx="600" cy="600" r="540" fill="url(#bgGlow)"/>
    <circle cx="600" cy="600" r="540" fill="none" stroke="url(#ring)" stroke-width="24"/>
  </g>

  <g transform="translate(0 24)">
    <text x="600" y="620" text-anchor="middle" font-size="196" font-family="Poppins, Montserrat, Segoe UI, Arial, sans-serif" font-weight="800" letter-spacing="2">
      <tspan fill="#ef1111">CAB</tspan><tspan fill="#111111">TECH</tspan>
    </text>
    <text x="600" y="740" text-anchor="middle" font-size="56" font-family="Poppins, Segoe UI, Arial, sans-serif" font-weight="500" fill="#374151" letter-spacing="6">
      CRM SOLUTIONS
    </text>
  </g>
</svg>
