services:
  - type: web
    name: cabtech-crm-api
    runtime: docker
    plan: free
    dockerfilePath: Dockerfile
    port: 8080
    healthCheckPath: /api/enquiries
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DB_PROVIDER
        value: mssql
      - key: ConnectionStrings__DefaultConnection
        value: "Server=tcp:your-server.database.windows.net,1433;Initial Catalog=CabtechCrm;Persist Security Info=False;User ID=your-user;Password=your-password;MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"
      - key: Auth__Jwt__Secret
        value: "PLEASE_CHANGE_THIS_TO_A_LONG_SECURE_RANDOM_STRING_FOR_PRODUCTION"
      - key: Auth__Jwt__Issuer
        value: "CabtechCrm"
      - key: Auth__Jwt__Audience
        value: "CabtechCrmClient"
